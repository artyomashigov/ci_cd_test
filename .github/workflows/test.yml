name: test-pipeline

on:
  push:
  pull_request:

jobs:
  build:
    name: build docker image
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: build image
        run: docker build -t my-backend-image .

  test:
    name: test docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: build image again (required on fresh runner)
        run: docker build -t my-backend-image .

      - name: run pytest
        run: docker run --rm my-backend-image pytest -s -v || echo "no tests found"

  deploy:
    name: deploy container
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: start docker compose
        run: |
          docker compose down || true
          docker compose up -d
