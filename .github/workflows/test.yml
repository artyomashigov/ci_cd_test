name: test-pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t my-backend-image:latest .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t my-backend-image:latest .
      - run: docker run --rm my-backend-image:latest pytest -s -v || echo "no tests found"

  deploy:
    name: deploy on ec2
    runs-on: [self-hosted, linux, ec2-ci]   # <-- your EC2 runner
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: compose up on server
        run: |
          docker compose down || true
          docker compose up -d --build
